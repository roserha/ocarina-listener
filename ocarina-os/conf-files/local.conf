# Let's define to use our own Distro!

DISTRO ?= "ocarinaos"

# Some default values

EXTRA_IMAGE_FEATURES ?= "debug-tweaks"
USER_CLASSES ?= "buildstats"
PATCHRESOLVE = "noop"

BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

PACKAGECONFIG:append:pn-qemu-system-native = " sdl"

# CONF_VERSION is increased each time build/conf/ changes incompatibly and is used to
# track the version of this file when it was generated. This can safely be ignored if
# this doesn't mean anything to you.
CONF_VERSION = "2"


# Select our raspberry pi machine!
# MACHINE = "raspberrypi0-2w-64"
MACHINE = "raspberrypi3-64"

# Accept license things for meta-raspberrypi
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch"

# Add SSH
EXTRA_IMAGE_FEATURES = "ssh-server-dropbear allow-empty-password empty-root-password allow-root-login"

# Say where to download things
DL_DIR ?= "/home/build/data/downloads"

# Implement sysvinit for speeding things up
SSTATE_DIR ?= "/home/build/my-build/sstate-cache"
INIT_MANAGER = "sysvinit"

# Install a BAJILLION things: 

# net-tools for networking, sysvinit things for sysvinit, busybox for SSH & networking, base-files and kernel-modules for correct initialization,
IMAGE_INSTALL:append = " net-tools sysvinit sysvinit-inittab sysvinit-pidof busybox base-files kernel-modules" 
# dhcpcd for ethernet/ip stuff, wpa-supplicant for wifi, coreutils for base64 and kitty ssh support, alsa for mic support, i2c-tools for I2S mic support, 
IMAGE_INSTALL:append = " dhcpcd wpa-supplicant coreutils alsa-lib alsa-utils i2c-tools"
# all these thingies for ocarina-gui
IMAGE_INSTALL:append = " fontconfig libxkbcommon libinput libgbm libdrm mesa"
# userland for cpu temp on login and other utilities, cage wayland for led display, and my custom ocarina-listener recipe!
IMAGE_INSTALL:append = " userland weston wayland wayland-protocols weston-init libxkbcommon ocarina-listener"


# Enables UART for serial monitoring and adds commands for splash screen

ENABLE_UART = "1"
CMDLINE:append = " console=serial0,115200 rw splash quiet initramfs_debug"
SERIAL_CONSOLES = "115200;ttyAMA0"

# Configs that are needed for the raspberry pi to properly work and for the mic to work as well

RPI_EXTRA_CONFIG = "\ndtoverlay=disable-bt\ndtparam=i2s=on\ndtparam=audio=off\ndtoverlay=googlevoicehat-soundcard\ndtparam=i2c_arm=on\ndisable_splash=1\nramfsfile=core-image-minimal-initramfs-raspberrypi3-64.cpio.gz\nramfsaddr=-1"
MACHINE_FEATURES:append = " i2c"
RPI_KERNEL_DEVICETREE_OVERLAYS:append = " overlays/googlevoicehat-soundcard.dtbo"

# I needed to add this to stop things from glitching for some reason
HOSTTOOLS += "update-desktop-database"
ROOTFS_POSTPROCESS_COMMAND:remove = "update_font_cache;"

# Wayland/display setup
DISTRO_FEATURES:append = " wayland opengl"
DISTRO_FEATURES:remove = "x11 vulkan"

# Initramfs setup
INITRAMFS_IMAGE = "core-image-minimal-initramfs"
INITRAMFS_IMAGE_BUNDLE = "0"
INITRAMFS_MAXSIZE = "131072"

# Ocarina Splash
IMAGE_BOOT_FILES:append = " core-image-minimal-initramfs-${MACHINE}.cpio.gz;core-image-minimal-initramfs-raspberrypi3-64.cpio.gz"